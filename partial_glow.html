<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>HDR 部分光らせるやつ ✨</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #111; color: #eee; }
  .app { display: flex; flex-direction: column; min-height: 100vh; }
  header { padding: 12px 16px; background: #1b1b1b; border-bottom: 1px solid #2a2a2a; }
  h1 { margin: 0; font-size: 15px; font-weight: 600; }
  h1 small { font-weight: 400; color: #888; margin-left: 8px; }
  .toolbar { display: flex; gap: 8px; padding: 10px 16px; background: #1b1b1b; flex-wrap: wrap; align-items: center; border-bottom: 1px solid #2a2a2a; }
  .toolbar button, .toolbar label.file { padding: 7px 12px; background: #2a2a2a; color: #eee; border: 1px solid #3a3a3a; border-radius: 6px; cursor: pointer; font-size: 13px; user-select: none; }
  .toolbar button:hover, .toolbar label.file:hover { background: #333; }
  .toolbar button.active { background: #2563eb; border-color: #3b82f6; }
  .toolbar button:disabled { opacity: 0.4; cursor: not-allowed; }
  .toolbar .group { display: flex; gap: 6px; padding-right: 8px; border-right: 1px solid #2a2a2a; }
  .toolbar .group:last-child { border-right: none; }
  .toolbar .save { background: #16a34a; border-color: #22c55e; }
  .toolbar .save:hover { background: #15803d; }
  .file input { display: none; }
  .sliders { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 14px 20px; padding: 12px 16px; background: #1b1b1b; border-bottom: 1px solid #2a2a2a; }
  .slider-row label { display: block; font-size: 12px; color: #aaa; margin-bottom: 4px; }
  .slider-row .val { color: #fff; font-weight: 600; margin-left: 4px; }
  .slider-row input[type=range] { width: 100%; }
  .slider-row.disabled { opacity: 0.45; pointer-events: none; }
  .canvas-area { flex: 1; padding: 16px; display: flex; justify-content: center; align-items: flex-start; background:
    repeating-conic-gradient(#1a1a1a 0% 25%, #222 0% 50%) 0 0/24px 24px; }
  .canvas-wrap { position: relative; max-width: 100%; }
  canvas { display: block; max-width: 100%; height: auto; touch-action: none; background: #000; border-radius: 6px; box-shadow: 0 4px 24px rgba(0,0,0,0.5); }
  .status { padding: 8px 16px; background: #1b1b1b; font-size: 12px; color: #888; border-top: 1px solid #2a2a2a; }
  .hint { color: #888; font-size: 12px; margin-left: auto; align-self: center; }
</style>
</head>
<body>
<div class="app">
  <header><h1>HDR 部分光らせるやつ ✨ <small>円/矩形で選択した範囲だけPQ HDRで光らせます</small></h1></header>
  <div class="toolbar">
    <div class="group">
      <label class="file"><input type="file" id="loadFile" accept="image/*">画像を読み込む</label>
    </div>
    <div class="group">
      <button id="toolSelect" class="active">↖ 選択/移動</button>
      <button id="toolEllipse">○ 円を追加</button>
      <button id="toolRect">▭ 矩形を追加</button>
    </div>
    <div class="group">
      <button id="deleteBtn" disabled>削除</button>
      <button id="clearBtn">全削除</button>
    </div>
    <div class="group">
      <button id="shareBtn" class="save">X/共有 (推奨)</button>
      <button id="saveBtn">HDR PNGを保存</button>
    </div>
    <span class="hint">作成: ドラッグ / 編集: 四隅で拡縮・上の○で回転(Shiftで15°スナップ)・内側で移動</span>
  </div>
  <div class="sliders">
    <div class="slider-row" id="brightnessRow">
      <label>選択した形の輝度<span class="val" id="brightnessVal">2000</span> nits</label>
      <input type="range" id="brightness" min="200" max="5000" step="50" value="2000">
    </div>
    <div class="slider-row" id="featherRow">
      <label>ぼかし(エッジの柔らかさ)<span class="val" id="featherVal">30</span> px</label>
      <input type="range" id="feather" min="0" max="200" step="1" value="30">
    </div>
    <div class="slider-row">
      <label>背景の明るさ(光らない部分)<span class="val" id="bgVal">203</span> nits</label>
      <input type="range" id="bg" min="80" max="400" step="1" value="203">
    </div>
    <div class="slider-row">
      <label>最大出力サイズ<span class="val" id="maxSizeVal">1080</span> px (X再エンコ回避用)</label>
      <select id="maxSize" style="width:100%; padding:6px; background:#2a2a2a; color:#eee; border:1px solid #3a3a3a; border-radius:6px;">
        <option value="400">400px (元アプリと同じ・最も安全)</option>
        <option value="800">800px</option>
        <option value="1080" selected>1080px (Tweet用おすすめ)</option>
        <option value="1440">1440px</option>
        <option value="2048">2048px</option>
        <option value="0">元のサイズ (X再エンコでiCCPが落ちる可能性大)</option>
      </select>
    </div>
    <div class="slider-row">
      <label>出力形式<span class="val" id="formatVal">UltraHDR JPEG</span></label>
      <select id="outFormat" style="width:100%; padding:6px; background:#2a2a2a; color:#eee; border:1px solid #3a3a3a; border-radius:6px;">
        <option value="ultrahdr" selected>UltraHDR JPEG (SDRで元写真・推奨)</option>
        <option value="pq">PQ PNG (HDRブラウザ専用)</option>
      </select>
    </div>
  </div>
  <div class="canvas-area">
    <div class="canvas-wrap"><canvas id="canvas" width="640" height="480"></canvas></div>
  </div>
  <div class="status" id="status">画像を読み込んで開始してください</div>
</div>

function decodeB64(b64) {
  const bin = atob(b64);
  const u = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) u[i] = bin.charCodeAt(i);
  return u;
}
const PQ_ICC_BYTES = decodeB64(PQ_ICC_B64);

// ===========================================================================
// PQ transfer function (SMPTE ST 2084)
// ===========================================================================
const PQ_M1 = 2610 / 16384;
const PQ_M2 = (2523 / 4096) * 128;
const PQ_C1 = 3424 / 4096;
const PQ_C2 = (2413 / 4096) * 32;
const PQ_C3 = (2392 / 4096) * 32;

function srgbToLinear(v) {
  const t = v / 255;
  return t <= 0.04045 ? t / 12.92 : Math.pow((t + 0.055) / 1.055, 2.4);
}
function linearToPQ(nits) {
  const t = Math.pow(Math.max(0, Math.min(10000, nits)) / 10000, PQ_M1);
  return Math.pow((PQ_C1 + PQ_C2 * t) / (1 + PQ_C3 * t), PQ_M2);
}

// ===========================================================================
// PNG chunk utilities — replicates the original glow-icon-maker's iCCP injector
// ===========================================================================
const CRC_TABLE = (() => {
  const t = new Uint32Array(256);
  for (let n = 0; n < 256; n++) {
    let c = n;
    for (let k = 0; k < 8; k++) c = (c & 1) ? (0xedb88320 ^ (c >>> 1)) : (c >>> 1);
    t[n] = c >>> 0;
  }
  return t;
})();
function crc32(bytes) {
  let c = 0xffffffff;
  for (let i = 0; i < bytes.length; i++) c = (c >>> 8) ^ CRC_TABLE[(c ^ bytes[i]) & 0xff];
  return (c ^ 0xffffffff) >>> 0;
}
function makeChunk(type, data) {
  const n = data.length;
  const out = new Uint8Array(8 + n + 4);
  const dv = new DataView(out.buffer);
  dv.setUint32(0, n);
  out[4] = type.charCodeAt(0); out[5] = type.charCodeAt(1);
  out[6] = type.charCodeAt(2); out[7] = type.charCodeAt(3);
  out.set(data, 8);
  const crcSrc = new Uint8Array(4 + n);
  crcSrc.set(out.slice(4, 8), 0);
  crcSrc.set(data, 4);
  dv.setUint32(8 + n, crc32(crcSrc));
  return out;
}
async function makeICCPChunk(iccBytes) {
  const name = new TextEncoder().encode("ICC Profile");
  const cs = new CompressionStream("deflate");
  const w = cs.writable.getWriter();
  w.write(iccBytes); w.close();
  const compressed = new Uint8Array(await new Response(cs.readable).arrayBuffer());
  const data = new Uint8Array(name.length + 2 + compressed.length);
  data.set(name, 0);
  data[name.length] = 0;
  data[name.length + 1] = 0;
  data.set(compressed, name.length + 2);
  return makeChunk("iCCP", data);
}
async function injectICC(pngBlob) {
  const buf = new Uint8Array(await pngBlob.arrayBuffer());
  const iccChunk = await makeICCPChunk(PQ_ICC_BYTES);
  const strip = new Set(["iCCP", "sRGB", "gAMA", "cHRM"]);
  const out = [buf.slice(0, 8)];
  let pos = 8;
  let inserted = false;
  const dv = new DataView(buf.buffer, buf.byteOffset, buf.byteLength);
  while (pos < buf.length) {
    const len = dv.getUint32(pos);
    const type = String.fromCharCode(buf[pos + 4], buf[pos + 5], buf[pos + 6], buf[pos + 7]);
    const end = pos + 8 + len + 4;
    if (!strip.has(type)) out.push(buf.slice(pos, end));
    if (type === "IHDR" && !inserted) { out.push(iccChunk); inserted = true; }
    pos = end;
    if (type === "IEND") break;
  }
  const total = out.reduce((s, a) => s + a.length, 0);
  const merged = new Uint8Array(total);
  let off = 0; for (const a of out) { merged.set(a, off); off += a.length; }
  return new Blob([merged], { type: "image/png" });
}

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const HANDLE = 12;
const ROT_HANDLE_R = 7;

const MIN_SIZE = 4;

let image = null;

let selectedId = null;
let tool = "select";
let nextId = 1;
let drag = null;

function rotPt(cx, cy, x, y, angle) {
  const c = Math.cos(angle), s = Math.sin(angle);
  const dx = x - cx, dy = y - cy;
  return [cx + dx * c - dy * s, cy + dx * s + dy * c];
}
function shapeCenter(s) { return [s.x + s.w / 2, s.y + s.h / 2]; }

const $ = (id) => document.getElementById(id);

function setStatus(msg) { $("status").textContent = msg; }

function setTool(t) {
  tool = t;
  $("toolEllipse").classList.toggle("active", t === "ellipse");
  $("toolRect").classList.toggle("active", t === "rect");
  $("toolSelect").classList.toggle("active", t === "select");
  canvas.style.cursor = t === "select" ? "default" : "crosshair";
}

function getSelected() { return shapes.find(s => s.id === selectedId); }

function syncSlidersToSelection() {
  const s = getSelected();
  const disabled = !s;
  $("brightnessRow").classList.toggle("disabled", disabled);
  $("featherRow").classList.toggle("disabled", disabled);
  $("deleteBtn").disabled = disabled;
  if (s) {
    $("brightness").value = s.brightness;
    $("brightnessVal").textContent = s.brightness;
    $("feather").value = s.feather;
    $("featherVal").textContent = s.feather;
  }
}

function selectShape(id) { selectedId = id; syncSlidersToSelection(); render(); }

function fitCanvasToImage() {
  if (!image) return;
  const maxW = Math.min(window.innerWidth - 48, 980);
  const maxH = Math.min(window.innerHeight - 320, 720);
  const scale = Math.min(maxW / image.width, maxH / image.height, 1);
  canvas.width = Math.max(1, Math.round(image.width * scale));
  canvas.height = Math.max(1, Math.round(image.height * scale));
}

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (!image) {
    ctx.fillStyle = "#222"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#666"; ctx.font = "14px sans-serif"; ctx.textAlign = "center";
    ctx.fillText("画像を読み込んでください", canvas.width / 2, canvas.height / 2);
    return;
  }
  ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
  for (const s of shapes) drawShapePreview(s, s.id === selectedId);
}

function drawShapePreview(s, selected) {
  const [cx, cy] = shapeCenter(s);
  const rot = s.rotation || 0;

  // Soft warm tint to indicate where glow will appear (HDR look can't be shown in SDR preview).
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rot);
  ctx.globalCompositeOperation = "screen";
  const intensity = Math.min(1, Math.max(0, (s.brightness - 203) / 4000));
  const alpha = 0.18 + 0.45 * intensity;
  if (s.type === "ellipse") {
    const rx = Math.max(1, s.w / 2), ry = Math.max(1, s.h / 2);
    const rMin = Math.min(rx, ry);
    const inner = Math.max(0, rMin - s.feather) / rMin;
    const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, rMin);
    grad.addColorStop(0, `rgba(255, 240, 200, ${alpha})`);
    grad.addColorStop(inner, `rgba(255, 240, 200, ${alpha})`);
    grad.addColorStop(1, "rgba(255, 240, 200, 0)");
    ctx.fillStyle = grad;
    ctx.save();
    ctx.scale(rx / rMin, ry / rMin);
    ctx.beginPath(); ctx.arc(0, 0, rMin, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  } else {
    if (s.feather > 0) ctx.filter = `blur(${Math.min(40, s.feather / 2)}px)`;
    ctx.fillStyle = `rgba(255, 240, 200, ${alpha})`;
    ctx.fillRect(-s.w / 2, -s.h / 2, s.w, s.h);
    ctx.filter = "none";
  }
  ctx.restore();

  // Outline (rotated) + corner & rotation handles for the selected shape
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rot);
  ctx.strokeStyle = selected ? "#60a5fa" : "rgba(255,255,255,0.55)";
  ctx.lineWidth = selected ? 1.8 : 1;
  ctx.setLineDash(selected ? [6, 4] : [3, 3]);
  if (s.type === "ellipse") {
    ctx.beginPath();
    ctx.ellipse(0, 0, Math.max(1, s.w / 2), Math.max(1, s.h / 2), 0, 0, Math.PI * 2);
    ctx.stroke();
  } else {
    ctx.strokeRect(-s.w / 2, -s.h / 2, s.w, s.h);
  }
  ctx.setLineDash([]);
  if (selected) {
    // Rotation handle stem + knob (above top-center, in local frame)
    ctx.strokeStyle = "#60a5fa";
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(0, -s.h / 2);
    ctx.lineTo(0, -s.h / 2 - ROT_OFFSET);
    ctx.stroke();
    ctx.fillStyle = "#60a5fa";
    ctx.beginPath();
    ctx.arc(0, -s.h / 2 - ROT_OFFSET, ROT_HANDLE_R, 0, Math.PI * 2);
    ctx.fill();
    // Corner handles (drawn in local space)
    const hx = s.w / 2, hy = s.h / 2;
    for (const [px, py] of [[-hx, -hy], [hx, -hy], [-hx, hy], [hx, hy]]) {
      ctx.fillRect(px - HANDLE / 2, py - HANDLE / 2, HANDLE, HANDLE);
    }
  }
  ctx.restore();
}

// World-space corner positions, rotated. Order: tl, tr, bl, br.
function corners(s) {
  const [cx, cy] = shapeCenter(s);
  const rot = s.rotation || 0;
  const hx = s.w / 2, hy = s.h / 2;
  return [
    rotPt(cx, cy, cx - hx, cy - hy, rot),
    rotPt(cx, cy, cx + hx, cy - hy, rot),
    rotPt(cx, cy, cx - hx, cy + hy, rot),
    rotPt(cx, cy, cx + hx, cy + hy, rot),
  ];
}

function rotHandleWorld(s) {
  const [cx, cy] = shapeCenter(s);
  return rotPt(cx, cy, cx, cy - s.h / 2 - ROT_OFFSET, s.rotation || 0);
}

function hitTest(s, x, y) {
  // Rotation handle first (most outside)
  const [rhx, rhy] = rotHandleWorld(s);
  if (Math.hypot(x - rhx, y - rhy) <= ROT_HANDLE_R + 4) return "rotate";
  // Corner handles (rotated)
  const cs = corners(s);
  const names = ["tl", "tr", "bl", "br"];
  for (let i = 0; i < 4; i++) {
    if (Math.abs(x - cs[i][0]) <= HANDLE && Math.abs(y - cs[i][1]) <= HANDLE) return names[i];
  }
  // Body: transform input into shape-local axis-aligned space, then standard test
  const [cx, cy] = shapeCenter(s);
  const [lx, ly] = rotPt(cx, cy, x, y, -(s.rotation || 0));
  if (s.type === "ellipse") {
    const rx = Math.max(1, s.w / 2), ry = Math.max(1, s.h / 2);
    const u = (lx - cx) / rx, v = (ly - cy) / ry;
    if (u * u + v * v <= 1) return "move";
  } else {
    if (lx >= s.x && lx <= s.x + s.w && ly >= s.y && ly <= s.y + s.h) return "move";
  }
  return null;
}

function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (canvas.width / rect.width),
    y: (e.clientY - rect.top) * (canvas.height / rect.height),
  };
}

canvas.addEventListener("pointerdown", (e) => {
  if (!image) return;
  canvas.setPointerCapture(e.pointerId);
  const { x, y } = getCanvasPos(e);
  if (tool === "ellipse" || tool === "rect") {
    const s = {
      id: nextId++, type: tool,
      x, y, w: 0, h: 0,
      rotation: 0,
      brightness: +$("brightness").value,
      feather: +$("feather").value,
    };
    shapes.push(s);
    selectedId = s.id;
    drag = { mode: "create", shape: s, startX: x, startY: y };
    syncSlidersToSelection();
    render();
    return;
  }
  for (let i = shapes.length - 1; i >= 0; i--) {
    const sh = shapes[i];
    const mode = hitTest(sh, x, y);
    if (mode) {
      selectedId = sh.id;
      if (mode === "move") {
        drag = { mode, shape: sh, startX: x, startY: y, sx: sh.x, sy: sh.y };
      } else if (mode === "rotate") {
        const [cx, cy] = shapeCenter(sh);
        drag = {
          mode, shape: sh,
          startAngle: Math.atan2(y - cy, x - cx),
          baseRotation: sh.rotation || 0,
        };
      } else {
        // Resize: pin the opposite corner in world coordinates so rotation is preserved
        const cs = corners(sh);
        const oppIndex = { tl: 3, tr: 2, bl: 1, br: 0 }[mode];
        drag = {
          mode, shape: sh,
          fixed: cs[oppIndex],
          rotation: sh.rotation || 0,
        };
      }
      syncSlidersToSelection(); render();
      return;
    }
  }
  selectShape(null);
});

canvas.addEventListener("pointermove", (e) => {
  if (!drag) return;
  const { x, y } = getCanvasPos(e);
  const s = drag.shape;
  if (drag.mode === "create") {
    s.x = Math.min(drag.startX, x);
    s.y = Math.min(drag.startY, y);
    s.w = Math.abs(x - drag.startX);
    s.h = Math.abs(y - drag.startY);
  } else if (drag.mode === "move") {
    s.x = drag.sx + (x - drag.startX);
    s.y = drag.sy + (y - drag.startY);
  } else if (drag.mode === "rotate") {
    const [cx, cy] = shapeCenter(s);
    let a = Math.atan2(y - cy, x - cx) - drag.startAngle + drag.baseRotation;
    // Snap to 15° steps when Shift is held
    if (e.shiftKey) {
      const step = Math.PI / 12;
      a = Math.round(a / step) * step;
    }
    s.rotation = a;
  } else {
    // Resize while preserving rotation: opposite world corner stays fixed
    const [fx, fy] = drag.fixed;
    const cx = (fx + x) / 2, cy = (fy + y) / 2;
    const dxw = x - fx, dyw = y - fy;
    const c = Math.cos(-drag.rotation), si = Math.sin(-drag.rotation);
    const localDx = dxw * c - dyw * si;
    const localDy = dxw * si + dyw * c;
    const w = Math.max(MIN_SIZE, Math.abs(localDx));
    const h = Math.max(MIN_SIZE, Math.abs(localDy));
    s.x = cx - w / 2;
    s.y = cy - h / 2;
    s.w = w; s.h = h;
  }
  render();
});

canvas.addEventListener("pointerup", () => {
  if (drag && drag.mode === "create") {
    if (drag.shape.w < MIN_SIZE || drag.shape.h < MIN_SIZE) {
      shapes = shapes.filter(s => s !== drag.shape);
      selectedId = null;
    } else {
      setTool("select");
    }
    syncSlidersToSelection();
    render();
  }
  drag = null;
});

window.addEventListener("keydown", (e) => {
  if ((e.key === "Delete" || e.key === "Backspace") && selectedId != null && e.target === document.body) {
    shapes = shapes.filter(s => s.id !== selectedId);
    selectShape(null);
    e.preventDefault();
  }
});

$("toolSelect").onclick = () => setTool("select");
$("toolEllipse").onclick = () => setTool("ellipse");
$("toolRect").onclick = () => setTool("rect");
$("clearBtn").onclick = () => { shapes = []; selectShape(null); };
$("deleteBtn").onclick = () => {
  if (selectedId == null) return;
  shapes = shapes.filter(s => s.id !== selectedId);
  selectShape(null);
};
$("loadFile").onchange = (e) => {
  const f = e.target.files[0];
  if (!f) return;
  const img = new Image();
  img.onload = () => {
    image = img; shapes = []; selectedId = null;
    fitCanvasToImage();
    syncSlidersToSelection();
    render();
    setStatus(`読込: ${img.width}×${img.height}px`);
    URL.revokeObjectURL(img.src);
  };
  img.src = URL.createObjectURL(f);
};
$("brightness").oninput = (e) => {
  $("brightnessVal").textContent = e.target.value;
  const s = getSelected(); if (s) { s.brightness = +e.target.value; render(); }
};
$("feather").oninput = (e) => {
  $("featherVal").textContent = e.target.value;
  const s = getSelected(); if (s) { s.feather = +e.target.value; render(); }
};
$("bg").oninput = (e) => { $("bgVal").textContent = e.target.value; };
$("maxSize").onchange = (e) => { $("maxSizeVal").textContent = e.target.value === "0" ? "原寸" : e.target.value; };

// ===========================================================================
// Export: per-pixel mask -> per-pixel nits -> PQ encode -> PNG + iCCP
// ===========================================================================
async function buildHDRBlob() {
  if (!image) throw new Error("画像が読み込まれていません");
  await new Promise(r => requestAnimationFrame(r));

  const maxSize = +$("maxSize").value;
  let targetW = image.width, targetH = image.height;
  if (maxSize > 0 && Math.max(image.width, image.height) > maxSize) {
    const r = maxSize / Math.max(image.width, image.height);
    targetW = Math.max(1, Math.round(image.width * r));
    targetH = Math.max(1, Math.round(image.height * r));
  }

  const out = document.createElement("canvas");
  out.width = targetW;
  out.height = targetH;
  const octx = out.getContext("2d");
  octx.imageSmoothingEnabled = true;
  octx.imageSmoothingQuality = "high";
  octx.drawImage(image, 0, 0, targetW, targetH);
  const imgData = octx.getImageData(0, 0, targetW, targetH);
  const d = imgData.data;

  const bgNits = +$("bg").value;
  const scale = targetW / canvas.width;
  const shapesO = shapes.map(s => {
    const x = s.x * scale, y = s.y * scale, w = s.w * scale, h = s.h * scale, f = s.feather * scale;
    const rot = s.rotation || 0;
    return {
      type: s.type, x, y, w, h, f,
      brightness: s.brightness,
      cx: x + w / 2, cy: y + h / 2,
      rx: Math.max(1, w / 2), ry: Math.max(1, h / 2),
      x2: x + w, y2: y + h,
      cosNeg: Math.cos(-rot), sinNeg: Math.sin(-rot),
      rotated: rot !== 0,
    };
  });

  const W = out.width, H = out.height;
  for (let py = 0; py < H; py++) {
    for (let px = 0; px < W; px++) {
      let nits = bgNits;
      for (const s of shapesO) {
        let m = 0;
        // Transform pixel into shape's axis-aligned (unrotated) frame
        let lpx = px, lpy = py;
        if (s.rotated) {
          const dx = px - s.cx, dy = py - s.cy;
          lpx = s.cx + dx * s.cosNeg - dy * s.sinNeg;
          lpy = s.cy + dx * s.sinNeg + dy * s.cosNeg;
        }
        if (s.type === "ellipse") {
          const u = (lpx - s.cx) / s.rx;
          const v = (lpy - s.cy) / s.ry;
          const dn = Math.sqrt(u * u + v * v);
          if (dn < 1) {
            const rMin = Math.min(s.rx, s.ry);
            const fn = s.f / rMin;
            m = fn <= 0 ? 1 : Math.min(1, (1 - dn) / fn);
          }
        } else {
          if (lpx >= s.x && lpx <= s.x2 && lpy >= s.y && lpy <= s.y2) {
            const inset = Math.min(lpx - s.x, s.x2 - lpx, lpy - s.y, s.y2 - lpy);
            m = s.f <= 0 ? 1 : Math.min(1, inset / s.f);
          }
        }
        if (m > 0) {
          const t = bgNits + (s.brightness - bgNits) * m;
          if (t > nits) nits = t;
        }
      }
      const i = (py * W + px) * 4;
      if (d[i + 3] === 0) { d[i] = 0; d[i + 1] = 0; d[i + 2] = 0; continue; }
      const lr = srgbToLinear(d[i]) * nits;
      const lg = srgbToLinear(d[i + 1]) * nits;
      const lb = srgbToLinear(d[i + 2]) * nits;
      d[i]     = Math.round(linearToPQ(lr) * 255);
      d[i + 1] = Math.round(linearToPQ(lg) * 255);
      d[i + 2] = Math.round(linearToPQ(lb) * 255);
    }
  }
  octx.putImageData(imgData, 0, 0);

  const pngBlob = await new Promise((resolve, reject) =>
    out.toBlob(b => b ? resolve(b) : reject(new Error("toBlob failed")), "image/png")
  );
  return await injectICC(pngBlob);
}

// ===========================================================================
// UltraHDR JPEG (ISO 21496-1 / Google UltraHDR)
//   - SDR-only viewers see the base JPEG (= the original photo) as-is.
//   - HDR-aware viewers read the gain map JPEG appended after EOI and the
//     hdrgm:* XMP metadata, then boost pixels per the gain map.
//   Layout: [primary JPEG with Container XMP] [gain-map JPEG with hdrgm XMP]
// ===========================================================================

function computeTargetParamsForUltraHDR() {
  if (!image) throw new Error("画像が読み込まれていません");
  const maxSize = +$("maxSize").value;
  let targetW = image.width, targetH = image.height;
  if (maxSize > 0 && Math.max(image.width, image.height) > maxSize) {
    const r = maxSize / Math.max(image.width, image.height);
    targetW = Math.max(1, Math.round(image.width * r));
    targetH = Math.max(1, Math.round(image.height * r));
  }
  return { targetW, targetH };
}

// Per-pixel mask evaluation reused for both PQ and UltraHDR paths.
function projectShapesToImage(scale) {
  return shapes.map(s => {
    const x = s.x * scale, y = s.y * scale, w = s.w * scale, h = s.h * scale, f = s.feather * scale;
    const rot = s.rotation || 0;
    return {
      type: s.type, x, y, w, h, f,
      brightness: s.brightness,
      cx: x + w / 2, cy: y + h / 2,
      rx: Math.max(1, w / 2), ry: Math.max(1, h / 2),
      x2: x + w, y2: y + h,
      cosNeg: Math.cos(-rot), sinNeg: Math.sin(-rot),
      rotated: rot !== 0,
    };
  });
}

function nitsAtPixel(px, py, shapesO, bgNits) {
  let nits = bgNits;
  for (const s of shapesO) {
    let m = 0;
    let lpx = px, lpy = py;
    if (s.rotated) {
      const dx = px - s.cx, dy = py - s.cy;
      lpx = s.cx + dx * s.cosNeg - dy * s.sinNeg;
      lpy = s.cy + dx * s.sinNeg + dy * s.cosNeg;
    }
    if (s.type === "ellipse") {
      const u = (lpx - s.cx) / s.rx;
      const v = (lpy - s.cy) / s.ry;
      const dn = Math.sqrt(u * u + v * v);
      if (dn < 1) {
        const rMin = Math.min(s.rx, s.ry);
        const fn = s.f / rMin;
        m = fn <= 0 ? 1 : Math.min(1, (1 - dn) / fn);
      }
    } else {
      if (lpx >= s.x && lpx <= s.x2 && lpy >= s.y && lpy <= s.y2) {
        const inset = Math.min(lpx - s.x, s.x2 - lpx, lpy - s.y, s.y2 - lpy);
        m = s.f <= 0 ? 1 : Math.min(1, inset / s.f);
      }
    }
    if (m > 0) {
      const t = bgNits + (s.brightness - bgNits) * m;
      if (t > nits) nits = t;
    }
  }
  return nits;
}

function canvasToJPEG(cnv, quality) {
  return new Promise((resolve, reject) =>
    cnv.toBlob(b => b ? resolve(b) : reject(new Error("JPEG encode failed")), "image/jpeg", quality)
  );
}

// Insert an XMP APP1 marker right after the SOI of an existing JPEG.
// Single-segment XMP only (payload ≤ ~64KB). Our XMP is well under 4KB.
async function injectXMPApp1(jpegBlob, xmpStr) {
  const buf = new Uint8Array(await jpegBlob.arrayBuffer());
  if (buf[0] !== 0xFF || buf[1] !== 0xD8) throw new Error("not a JPEG");
  const ID = new TextEncoder().encode("http://ns.adobe.com/xap/1.0/\0");
  const XMP = new TextEncoder().encode(xmpStr);
  const segLen = ID.length + XMP.length + 2; // includes the 2-byte length field
  if (segLen > 65535) throw new Error("XMP too large for a single APP1 segment");
  const marker = new Uint8Array(4 + ID.length + XMP.length);
  marker[0] = 0xFF; marker[1] = 0xE1;
  marker[2] = (segLen >> 8) & 0xff;
  marker[3] = segLen & 0xff;
  marker.set(ID, 4);
  marker.set(XMP, 4 + ID.length);
  const out = new Uint8Array(2 + marker.length + buf.length - 2);
  out[0] = 0xFF; out[1] = 0xD8;
  out.set(marker, 2);
  out.set(buf.subarray(2), 2 + marker.length);
  return out;
}

function buildPrimaryXMP(gainMapJpegLength) {
  return `<?xpacket begin="﻿" id="W5M0MpCehiHzreSzNTczkc9d"?>
<x:xmpmeta xmlns:x="adobe:ns:meta/" x:xmptk="HDRGlowMaker">
  <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#">
    <rdf:Description rdf:about=""
        xmlns:hdrgm="http://ns.adobe.com/hdr-gain-map/1.0/"
        xmlns:Container="http://ns.google.com/photos/1.0/container/"
        xmlns:Item="http://ns.google.com/photos/1.0/container/item/"
        hdrgm:Version="1.0">
      <Container:Directory>
        <rdf:Seq>
          <rdf:li rdf:parseType="Resource">
            <Container:Item Item:Semantic="Primary" Item:Mime="image/jpeg"/>
          </rdf:li>
          <rdf:li rdf:parseType="Resource">
            <Container:Item Item:Semantic="GainMap" Item:Mime="image/jpeg" Item:Length="${gainMapJpegLength}"/>
          </rdf:li>
        </rdf:Seq>
      </Container:Directory>
    </rdf:Description>
  </rdf:RDF>
</x:xmpmeta>
<?xpacket end="w"?>`;
}

function buildGainMapXMP(gainMapMin, gainMapMax, hdrCapacityMax) {
  return `<?xpacket begin="﻿" id="W5M0MpCehiHzreSzNTczkc9d"?>
<x:xmpmeta xmlns:x="adobe:ns:meta/" x:xmptk="HDRGlowMaker">
  <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#">
    <rdf:Description rdf:about=""
        xmlns:hdrgm="http://ns.adobe.com/hdr-gain-map/1.0/"
        hdrgm:Version="1.0"
        hdrgm:GainMapMin="${gainMapMin.toFixed(6)}"
        hdrgm:GainMapMax="${gainMapMax.toFixed(6)}"
        hdrgm:Gamma="1.0"
        hdrgm:OffsetSDR="0.015625"
        hdrgm:OffsetHDR="0.015625"
        hdrgm:HDRCapacityMin="0.0"
        hdrgm:HDRCapacityMax="${hdrCapacityMax.toFixed(6)}"
        hdrgm:BaseRenditionIsHDR="False"/>
  </rdf:RDF>
</x:xmpmeta>
<?xpacket end="w"?>`;
}

async function buildUltraHDRBlob() {
  const { targetW, targetH } = computeTargetParamsForUltraHDR();
  await new Promise(r => requestAnimationFrame(r));

  // --- 1. SDR base = original photo at target size ---
  const baseCnv = document.createElement("canvas");
  baseCnv.width = targetW; baseCnv.height = targetH;
  const bctx = baseCnv.getContext("2d");
  bctx.imageSmoothingEnabled = true;
  bctx.imageSmoothingQuality = "high";
  bctx.drawImage(image, 0, 0, targetW, targetH);

  // --- 2. Gain map ---
  // Per-pixel boost in log2 units: gain_log2 = log2(target_nits / sdrRef).
  // Encode into 8-bit: g = clamp((gain_log2 - GainMapMin) / (GainMapMax - GainMapMin), 0, 1) * 255
  const bgNits = +$("bg").value;          // background reference (SDR diffuse white)
  const sdrRef = bgNits;
  const scale = targetW / canvas.width;
  const shapesO = projectShapesToImage(scale);

  // Pick GainMapMax from the brightest shape (with a small floor for headroom).
  let maxLog2 = 0;
  for (const s of shapes) {
    const b = Math.log2(Math.max(1, s.brightness / sdrRef));
    if (b > maxLog2) maxLog2 = b;
  }
  if (maxLog2 < 0.01) maxLog2 = 1; // no shapes / no boost: nominal range
  const gainMapMin = 0;
  const gainMapMax = maxLog2;
  const range = gainMapMax - gainMapMin;

  const gainCnv = document.createElement("canvas");
  gainCnv.width = targetW; gainCnv.height = targetH;
  const gctx = gainCnv.getContext("2d");
  const gain = gctx.createImageData(targetW, targetH);
  const gd = gain.data;

  for (let py = 0; py < targetH; py++) {
    for (let px = 0; px < targetW; px++) {
      const nits = nitsAtPixel(px, py, shapesO, sdrRef);
      let v = 0;
      if (nits > sdrRef) {
        const log2g = Math.log2(nits / sdrRef);
        v = Math.round(Math.max(0, Math.min(1, (log2g - gainMapMin) / range)) * 255);
      }
      const i = (py * targetW + px) * 4;
      gd[i] = v; gd[i + 1] = v; gd[i + 2] = v; gd[i + 3] = 255;
    }
  }
  gctx.putImageData(gain, 0, 0);

  // --- 3. Encode both as JPEG ---
  const baseJpegRaw = await canvasToJPEG(baseCnv, 0.92);
  const gainJpegRaw = await canvasToJPEG(gainCnv, 0.90);

  // --- 4. XMP injection ---
  // Inject gain map's XMP first so we know its final length for the primary's Container:Length.
  const gainXMP = buildGainMapXMP(gainMapMin, gainMapMax, gainMapMax);
  const gainWithXMP = await injectXMPApp1(gainJpegRaw, gainXMP);

  const primaryXMP = buildPrimaryXMP(gainWithXMP.length);
  const baseWithXMP = await injectXMPApp1(baseJpegRaw, primaryXMP);

  // --- 5. Concatenate primary + secondary ---
  const merged = new Uint8Array(baseWithXMP.length + gainWithXMP.length);
  merged.set(baseWithXMP, 0);
  merged.set(gainWithXMP, baseWithXMP.length);
  return new Blob([merged], { type: "image/jpeg" });
}

// ---------------------------------------------------------------------------
// Save / share dispatch
// ---------------------------------------------------------------------------
function outputFormat() { return $("outFormat").value; }
function outputMeta() {
  return outputFormat() === "ultrahdr"
    ? { ext: "jpg",  mime: "image/jpeg", label: "UltraHDR JPEG", build: buildUltraHDRBlob }
    : { ext: "png",  mime: "image/png",  label: "HDR PNG (PQ)", build: buildHDRBlob };
}

async function saveHDR() {
  const meta = outputMeta();
  setStatus(`${meta.label} を生成中...`);
  const blob = await meta.build();
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `hdr_partial_glow.${meta.ext}`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1500);
  setStatus(`${meta.label} 保存完了 (${(blob.size / 1024).toFixed(1)} KB)`);
}

// Twitter (X) re-encodes uploads from the web/Files picker and strips iCCP,
// killing the HDR tag. Web Share API hands the file straight to the X app on
// iOS/Android — the original ピカピカアイコンメーカー relies on this too.
async function shareHDR() {
  const meta = outputMeta();
  setStatus(`${meta.label} を生成中...`);
  const blob = await meta.build();
  const file = new File([blob], `hdr_partial_glow.${meta.ext}`, { type: meta.mime });
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({
        files: [file],
        title: "HDR部分光るやつ",
        text: "#HDRPNG #ひかるやつ",
      });
      setStatus(`共有完了 (${(blob.size / 1024).toFixed(1)} KB / ${meta.label})`);
      return;
    } catch (err) {
      if (err && err.name === "AbortError") { setStatus("共有キャンセル"); return; }
      throw err;
    }
  }
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `hdr_partial_glow.${meta.ext}`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1500);
  setStatus(`Web Share非対応のためダウンロードしました (${meta.label})`);
}

$("outFormat").onchange = (e) => {
  const lbl = e.target.value === "ultrahdr" ? "UltraHDR JPEG" : "PQ PNG";
  $("formatVal").textContent = lbl;
};
$("saveBtn").onclick = () => saveHDR().catch(err => { console.error(err); setStatus("エラー: " + err.message); });
$("shareBtn").onclick = () => shareHDR().catch(err => { console.error(err); setStatus("エラー: " + err.message); });
if (!(navigator.canShare && typeof navigator.share === "function")) {
  $("shareBtn").disabled = true;
  $("shareBtn").title = "このブラウザはWeb Share API非対応。iOS/Android Safariなどで開いてください";
}

window.addEventListener("resize", () => { if (image) { fitCanvasToImage(); render(); } });

render();
setTool("select");
</script>
</body>
</html>
